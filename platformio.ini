; Hismith Piupiu BLE emulator -- RobotDyn ESP32 Smart Home Controller (ESP32R4)
;
; The official PlatformIO `espressif32` platform is capped at Arduino 2.0.17 and
; will not gain 3.x support, so this pins the maintained pioarduino fork.
; See docs/HARDWARE.md for the board pinout and how to confirm it.

[platformio]
default_envs = esp32r4

[common]
; Tunables live in src/config.h with #ifndef guards. Override them here, e.g.:
;   build_flags = ${common.build_flags} -D RELAY_GPIO=26 -D RELAY_ACTIVE_LOW=1
build_flags =
    -std=gnu++17
    -Wall
    -Wextra
build_unflags =
    -std=gnu++11

[env:esp32r4]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    h2zero/NimBLE-Arduino@^2.5.0
build_flags = ${common.build_flags}
build_unflags = ${common.build_unflags}
; The platform emits firmware.factory.bin (bootloader + partitions + boot_app0 +
; app, flashable at 0x0) on its own -- that is what the web flasher serves.

; Flash this to find which GPIO drives which relay and whether the board is
; active-high or active-low. Cycles each candidate pin and logs to serial.
; BLE is not started in this mode.
[env:esp32r4-selftest]
extends = env:esp32r4
build_flags = ${env:esp32r4.build_flags} -D RELAY_SELFTEST=1

; Host-native unit tests for the protocol parser and relay state machine.
; Both are pure C++ with no Arduino includes, so they run in CI without hardware.
[env:native]
platform = native
test_framework = unity
build_flags =
    ${common.build_flags}
    -I src
build_unflags = ${common.build_unflags}
build_src_filter =
    +<hismith_protocol.cpp>
    +<relay.cpp>
test_build_src = yes
