# Verification gate only: no artifacts are uploaded. The release workflow is
# what produces downloadable builds -- it attaches firmware.factory.bin to the
# GitHub release and publishes it to the flasher site.

name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  firmware:
    name: Test and build firmware
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: pio-${{ runner.os }}-

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      # The protocol parser and relay state machine are pure C++, so the logic
      # is tested here without hardware in the loop.
      - name: Unit tests (host)
        run: pio test -e native

      - name: Build firmware
        run: pio run -e esp32r4

      - name: Build self-test firmware
        run: pio run -e esp32r4-selftest

  flasher:
    name: Build web flasher
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build flasher
        working-directory: web
        run: npm run build
